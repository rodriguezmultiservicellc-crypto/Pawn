<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawn loans — redesign</title>
<style>
  :root{
    --navy:#0d1b2a;--gold:#e8a020;--gold-hi:#f4b53c;--ink:#0d1b2a;
    --muted:#6b7a8d;--line:#e4e9f0;--surface:#f4f6f9;--card:#fff;
    --green:#1f9d6b;--red:#d6453f;--amber:#c98a17;--slate:#64748b;
    --radius:14px;--shadow:0 1px 2px rgba(13,27,42,.04),0 8px 24px rgba(13,27,42,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--surface);color:var(--ink);-webkit-font-smoothing:antialiased}
  .tnum{font-variant-numeric:tabular-nums}.serif{font-family:"Georgia",serif}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}

  .topbar{height:56px;display:flex;align-items:center;gap:12px;padding:0 22px;
    background:var(--card);border-bottom:1px solid var(--line)}
  .brand{font-weight:800;font-size:18px}.dot{color:#c2ccd6}
  .tenant{font-size:13px;font-weight:700;border:1px solid var(--line);border-radius:9px;padding:6px 12px;background:var(--surface)}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:16px;font-size:13px}
  .pill-admin{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;font-weight:700;font-size:11px;padding:5px 10px;border-radius:999px}
  .pill-admin b{color:var(--gold)}.user{font-weight:700}

  .wrap{max-width:1320px;margin:0 auto;padding:22px}
  .head{display:flex;align-items:center;margin-bottom:18px}
  .head h1{font-size:25px;font-weight:800;letter-spacing:-.02em}
  .new{margin-left:auto;display:flex;align-items:center;gap:8px;background:linear-gradient(180deg,var(--gold-hi),var(--gold));
    color:#3a2600;border:none;border-radius:11px;padding:13px 20px;font-weight:800;font-size:14px;cursor:pointer;
    box-shadow:0 8px 18px rgba(232,160,32,.28)}
  .new:hover{filter:brightness(1.04);transform:translateY(-1px)}

  /* summary strip */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  @media(max-width:820px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px 18px;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--slate)}
  .stat.s-loan::before{background:var(--navy)}
  .stat.s-due::before{background:var(--amber)}
  .stat.s-over::before{background:var(--red)}
  .stat.s-earn::before{background:var(--green)}
  .stat .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .stat .big{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:6px}
  .stat .sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}
  .stat.s-over .big{color:var(--red)}
  .stat.s-earn .sub{color:var(--green)}

  /* filter pills */
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .fp{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--line);
    border-radius:999px;padding:8px 14px;font-weight:700;font-size:13px;color:var(--ink);cursor:pointer}
  .fp .c{font-size:11px;font-weight:800;background:var(--surface);border-radius:999px;padding:1px 8px;color:var(--muted)}
  .fp:hover{border-color:var(--gold)}
  .fp.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .fp.on .c{background:rgba(255,255,255,.18);color:#fff}
  .fp.on.over{background:var(--red);border-color:var(--red)}
  .fp.on.due{background:var(--amber);border-color:var(--amber)}

  /* toolbar */
  .toolbar{display:flex;gap:10px;margin-bottom:14px}
  .search{flex:1;display:flex;align-items:center;gap:9px;background:var(--card);border:1.5px solid var(--line);
    border-radius:11px;padding:0 14px;height:46px}
  .search input{border:none;outline:none;flex:1;font-size:14px;background:transparent;color:var(--ink)}
  .search svg{color:var(--muted)}
  .sel{height:46px;border:1.5px solid var(--line);border-radius:11px;background:var(--card);
    padding:0 14px;font-size:14px;font-weight:600;color:var(--ink);outline:none;cursor:pointer}

  /* table */
  .tbl{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:visible}
  .tr{display:grid;grid-template-columns:96px 1.4fr 1.3fr .8fr .9fr 1.1fr .9fr 120px;align-items:center;
    gap:14px;padding:13px 18px;border-bottom:1px solid var(--line)}
  .tr:last-child{border-bottom:none}
  .thead{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .thead .sortable{cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:4px}
  .thead .sortable:hover{color:var(--ink)}
  .trow{position:relative;border-left:3px solid transparent}
  .trow:hover{background:#fafbfc}
  .trow.r-over{border-left-color:var(--red)}
  .trow.r-due{border-left-color:var(--amber)}
  .tk{font-size:13px;font-weight:700;color:var(--navy)}
  .cust .nm{font-weight:700;font-size:13.5px}
  .cust .ph{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
  .collat{font-size:13px;font-weight:600}
  .collat .more{font-size:11px;color:var(--muted);font-weight:700}
  .prin{font-weight:700;font-size:13.5px}
  .payoff{font-weight:800;font-size:13.5px}
  .payoff .pi{display:block;font-size:10.5px;color:var(--muted);font-weight:600}
  .due .d{font-weight:700;font-size:13px}
  .due .rel{font-size:11px;font-weight:700;margin-top:2px}
  .rel.over{color:var(--red)}.rel.soon{color:var(--amber)}.rel.ok{color:var(--muted)}
  .badge{font-size:11px;font-weight:800;border-radius:999px;padding:4px 11px;display:inline-block}
  .b-active{background:#e6f6ee;color:var(--green)}
  .b-overdue{background:#fdeceb;color:var(--red)}
  .b-due{background:#fcf3e0;color:var(--amber)}
  .b-redeemed{background:#eef1f5;color:var(--slate)}
  .b-forfeited{background:#e7ebf0;color:var(--navy)}
  .b-voided{background:#f1f1f3;color:#9aa3ad}
  .acts{display:flex;align-items:center;gap:6px;justify-content:flex-end;position:relative}
  .pay{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap}
  .pay:hover{background:#16304a}
  .kebab{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--muted);font-weight:800}
  .kebab:hover{border-color:var(--gold)}
  .menu{position:absolute;top:36px;right:0;background:#fff;border:1px solid var(--line);border-radius:10px;
    box-shadow:0 12px 30px rgba(13,27,42,.16);padding:6px;z-index:20;min-width:150px;display:none}
  .menu.show{display:block}
  .menu button{display:block;width:100%;text-align:left;border:none;background:none;padding:8px 10px;border-radius:7px;
    font-size:13px;font-weight:600;color:var(--ink);cursor:pointer}
  .menu button:hover{background:var(--surface)}
  .menu button.danger{color:var(--red)}
  .empty{padding:48px;text-align:center;color:var(--muted)}
  @media(max-width:900px){.tbl{overflow-x:auto}.tr{min-width:920px}}
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand serif">Pawn</span><span class="dot">·</span>
    <span class="tenant">Eddy's Jewelers Corp.</span>
    <div class="right"><span class="pill-admin"><b>ADMIN</b> Console</span><span class="user">Eddy Rodriguez</span></div>
  </div>

  <div class="wrap">
    <div class="head">
      <h1 class="serif">Pawn loans</h1>
      <button class="new"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New pawn ticket</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="pills" id="pills"></div>

    <div class="toolbar">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" placeholder="Search by ticket, customer name, or phone…" oninput="render()">
      </div>
      <select class="sel" id="dueFilter" onchange="render()">
        <option value="all">All due dates</option>
        <option value="overdue">Overdue</option>
        <option value="7">Due in 7 days</option>
        <option value="30">Due in 30 days</option>
      </select>
    </div>

    <div class="tbl">
      <div class="tr thead">
        <span>Ticket</span><span>Customer</span><span>Collateral</span>
        <span class="sortable" onclick="setSort('principal')">Principal</span>
        <span class="sortable" onclick="setSort('payoff')">Payoff due</span>
        <span class="sortable" onclick="setSort('due')">Due ▾</span>
        <span>Status</span><span style="text-align:right">Actions</span>
      </div>
      <div id="rows"></div>
    </div>
  </div>

<script>
  const TODAY=new Date(2026,5,30); // Jun 30 2026
  const LOANS=[
    {tk:'PT-000002',nm:'Rodriguez, Eddy',ph:'(813) 647-5237',collat:'14K Gold Rope Chain',extra:0,principal:112,rate:0.10,issue:'2026-05-06',due:'2026-06-05',status:'open'},
    {tk:'PT-000006',nm:'Maria Fernandez',ph:'(813) 555-0142',collat:'Diamond Ring 0.75ct',extra:1,principal:400,rate:0.10,issue:'2026-06-04',due:'2026-07-04',status:'open'},
    {tk:'PT-000005',nm:'Carlos Mendez',ph:'(813) 555-0188',collat:'iPhone 14 Pro 256GB',extra:0,principal:250,rate:0.10,issue:'2026-06-12',due:'2026-07-12',status:'open'},
    {tk:'PT-000004',nm:'José García',ph:'(813) 555-0210',collat:'14K Gold Bracelet',extra:2,principal:180,rate:0.10,issue:'2026-06-20',due:'2026-07-20',status:'open'},
    {tk:'PT-000003',nm:'Ana López',ph:'(813) 555-0177',collat:'DeWalt 20V Drill Kit',extra:0,principal:90,rate:0.10,issue:'2026-05-20',due:'2026-06-19',status:'redeemed',closed:'2026-06-18'},
    {tk:'PT-000001',nm:'Luis Pérez',ph:'(813) 555-0133',collat:'Bose Soundbar',extra:0,principal:75,rate:0.10,issue:'2026-04-10',due:'2026-05-10',status:'forfeited',closed:'2026-06-10'}
  ];
  let activePill='active', sortKey='due', sortDir=1;
  const $=id=>document.getElementById(id);
  const money=n=>"$"+(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  const parse=s=>{const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);};
  const days=(a,b)=>Math.round((b-a)/86400000);

  function payoff(l){
    const end=l.status==='open'?TODAY:parse(l.closed||l.due);
    const elapsed=Math.max(0,days(parse(l.issue),end));
    const interest=l.principal*l.rate*(elapsed/30);
    return {amount:l.principal+interest,interest};
  }
  function openState(l){ // derived urgency for open loans
    const d=days(TODAY,parse(l.due));
    if(d<0)return{key:'overdue',badge:'b-overdue',label:'Overdue',rel:`${-d} days overdue`,relc:'over',row:'r-over'};
    if(d<=7)return{key:'due',badge:'b-due',label:'Due soon',rel:`in ${d} days`,relc:'soon',row:'r-due'};
    return{key:'active',badge:'b-active',label:'Active',rel:`in ${d} days`,relc:'ok',row:''};
  }
  function meta(l){
    if(l.status==='redeemed')return{key:'redeemed',badge:'b-redeemed',label:'Redeemed',rel:'redeemed '+l.closed,relc:'ok',row:''};
    if(l.status==='forfeited')return{key:'forfeited',badge:'b-forfeited',label:'Forfeited',rel:'forfeited '+l.closed,relc:'ok',row:''};
    if(l.status==='voided')return{key:'voided',badge:'b-voided',label:'Voided',rel:'',relc:'ok',row:''};
    return openState(l);
  }
  const isOpen=l=>l.status==='open';

  function counts(){
    const open=LOANS.filter(isOpen);
    return {
      active:open.length,
      overdue:open.filter(l=>meta(l).key==='overdue').length,
      due:open.filter(l=>meta(l).key==='due').length,
      redeemed:LOANS.filter(l=>l.status==='redeemed').length,
      forfeited:LOANS.filter(l=>l.status==='forfeited').length,
      voided:LOANS.filter(l=>l.status==='voided').length,
      all:LOANS.length
    };
  }

  function renderStats(){
    const open=LOANS.filter(isOpen);
    const onLoan=open.reduce((a,l)=>a+l.principal,0);
    const overdue=open.filter(l=>meta(l).key==='overdue');
    const overdueVal=overdue.reduce((a,l)=>a+payoff(l).amount,0);
    const dueSoon=open.filter(l=>meta(l).key==='due');
    const dueVal=dueSoon.reduce((a,l)=>a+payoff(l).amount,0);
    const redeemed30=LOANS.filter(l=>l.status==='redeemed');
    const earned=redeemed30.reduce((a,l)=>a+payoff(l).interest,0);
    $('stats').innerHTML=`
      <div class="stat s-loan"><div class="lbl">On loan now</div><div class="big tnum">${money(onLoan)}</div><div class="sub">${open.length} active tickets</div></div>
      <div class="stat s-due"><div class="lbl">Due soon (7 days)</div><div class="big tnum">${dueSoon.length}</div><div class="sub">${money(dueVal)} to redeem</div></div>
      <div class="stat s-over"><div class="lbl">Overdue</div><div class="big tnum">${overdue.length}</div><div class="sub">${money(overdueVal)} at risk</div></div>
      <div class="stat s-earn"><div class="lbl">Redeemed (30 days)</div><div class="big tnum">${redeemed30.length}</div><div class="sub">${money(earned)} interest earned</div></div>`;
  }

  function renderPills(){
    const c=counts();
    const defs=[
      ['active','Active',c.active,''],['overdue','Overdue',c.overdue,'over'],
      ['due','Due soon',c.due,'due'],['redeemed','Redeemed',c.redeemed,''],
      ['forfeited','Forfeited',c.forfeited,''],['voided','Voided',c.voided,''],['all','All',c.all,'']
    ];
    $('pills').innerHTML=defs.map(([k,lbl,n,cls])=>
      `<button class="fp ${cls} ${k===activePill?'on':''}" onclick="setPill('${k}')">${lbl}<span class="c">${n}</span></button>`
    ).join('');
  }
  function setPill(k){activePill=k;renderPills();render();}
  function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1;}render();}

  function matchPill(l){
    if(activePill==='all')return true;
    if(activePill==='active')return isOpen(l);
    if(activePill==='overdue')return isOpen(l)&&meta(l).key==='overdue';
    if(activePill==='due')return isOpen(l)&&meta(l).key==='due';
    return l.status===activePill;
  }
  function matchDue(l){
    const f=$('dueFilter').value;if(f==='all'||!isOpen(l))return f==='all';
    const d=days(TODAY,parse(l.due));
    if(f==='overdue')return d<0; if(f==='7')return d>=0&&d<=7; if(f==='30')return d>=0&&d<=30;
    return true;
  }

  function render(){
    renderStats();
    const q=$('q').value.trim().toLowerCase();
    let list=LOANS.filter(l=>matchPill(l)&&matchDue(l)&&
      (!q||l.tk.toLowerCase().includes(q)||l.nm.toLowerCase().includes(q)||l.ph.includes(q)));
    list.sort((a,b)=>{
      let av,bv;
      if(sortKey==='due'){av=parse(a.due);bv=parse(b.due);}
      else if(sortKey==='principal'){av=a.principal;bv=b.principal;}
      else{av=payoff(a).amount;bv=payoff(b).amount;}
      return (av>bv?1:av<bv?-1:0)*sortDir;
    });
    if(!list.length){$('rows').innerHTML='<div class="empty">No loans match this view.</div>';return;}
    $('rows').innerHTML=list.map((l,idx)=>{
      const m=meta(l), po=payoff(l);
      const acts=isOpen(l)
        ? `<button class="pay" onclick="alert('Take payment — ${l.tk}')">Take payment</button>`
        : `<button class="pay" style="background:#eef1f5;color:var(--slate)" onclick="alert('View ${l.tk}')">View</button>`;
      return `<div class="tr trow ${m.row}">
        <span class="tk mono">${l.tk}</span>
        <div class="cust"><div class="nm">${l.nm}</div><div class="ph">${l.ph}</div></div>
        <div class="collat">${l.collat}${l.extra?` <span class="more">+${l.extra}</span>`:''}</div>
        <span class="prin tnum">${money(l.principal)}</span>
        <span class="payoff tnum">${money(po.amount)}<span class="pi">+${money(po.interest)} int</span></span>
        <div class="due"><div class="d tnum">${l.due}</div><div class="rel ${m.relc}">${m.rel}</div></div>
        <span><span class="badge ${m.badge}">${m.label}</span></span>
        <div class="acts">${acts}
          <button class="kebab" onclick="toggleMenu(event,${idx})">⋯</button>
          <div class="menu" id="menu${idx}">
            <button onclick="alert('View ticket')">View ticket</button>
            ${isOpen(l)?`<button onclick="alert('Extend')">Extend / renew</button>
            <button onclick="alert('Redeem')">Redeem</button>`:''}
            <button onclick="alert('Print')">Print ticket</button>
            ${isOpen(l)?`<button class="danger" onclick="alert('Forfeit')">Mark forfeited</button>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  }
  function toggleMenu(e,i){e.stopPropagation();document.querySelectorAll('.menu').forEach(m=>{if(m.id!=='menu'+i)m.classList.remove('show')});$('menu'+i).classList.toggle('show');}
  document.addEventListener('click',()=>document.querySelectorAll('.menu').forEach(m=>m.classList.remove('show')));

  renderPills();render();
</script>
</body>
</html>
